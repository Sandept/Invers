<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1b2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0a020;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e676;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00bfa5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagon background -->
  <polygon points="100,8 178,52 178,148 100,192 22,148 22,52"
    fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="2.5"/>

  <!-- Inner hex ring -->
  <polygon points="100,22 165,60 165,140 100,178 35,140 35,60"
    fill="none" stroke="#1e3050" stroke-width="1"/>

  <!-- Grid lines (subtle) -->
  <line x1="45" y1="130" x2="155" y2="130" stroke="#1a2540" stroke-width="0.8"/>
  <line x1="45" y1="115" x2="155" y2="115" stroke="#1a2540" stroke-width="0.8"/>
  <line x1="45" y1="100" x2="155" y2="100" stroke="#1a2540" stroke-width="0.8"/>
  <line x1="45" y1="85" x2="155" y2="85" stroke="#1a2540" stroke-width="0.8"/>

  <!-- Candlestick bars -->
  <rect x="55" y="112" width="8" height="18" rx="1.5" fill="#ff5252" opacity="0.85"/>
  <line x1="59" y1="108" x2="59" y2="112" stroke="#ff5252" stroke-width="1.5"/>
  <line x1="59" y1="130" x2="59" y2="134" stroke="#ff5252" stroke-width="1.5"/>

  <rect x="72" y="104" width="8" height="20" rx="1.5" fill="#00e676" opacity="0.85"/>
  <line x1="76" y1="100" x2="76" y2="104" stroke="#00e676" stroke-width="1.5"/>
  <line x1="76" y1="124" x2="76" y2="128" stroke="#00e676" stroke-width="1.5"/>

  <rect x="89" y="95" width="8" height="22" rx="1.5" fill="#00e676" opacity="0.85"/>
  <line x1="93" y1="90" x2="93" y2="95" stroke="#00e676" stroke-width="1.5"/>
  <line x1="93" y1="117" x2="93" y2="122" stroke="#00e676" stroke-width="1.5"/>

  <rect x="106" y="88" width="8" height="24" rx="1.5" fill="#ff5252" opacity="0.85"/>
  <line x1="110" y1="84" x2="110" y2="88" stroke="#ff5252" stroke-width="1.5"/>
  <line x1="110" y1="112" x2="110" y2="116" stroke="#ff5252" stroke-width="1.5"/>

  <rect x="123" y="76" width="8" height="22" rx="1.5" fill="#00e676" opacity="0.85"/>
  <line x1="127" y1="71" x2="127" y2="76" stroke="#00e676" stroke-width="1.5"/>
  <line x1="127" y1="98" x2="127" y2="103" stroke="#00e676" stroke-width="1.5"/>

  <!-- Trend line (rising) -->
  <polyline points="55,128 72,118 93,108 110,102 127,88 145,74"
    fill="none" stroke="url(#greenGrad)" stroke-width="2.2"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- Gold coin (top-left area) -->
  <circle cx="62" cy="67" r="12" fill="url(#goldGrad)" filter="url(#goldGlow)"/>
  <circle cx="62" cy="67" r="9" fill="none" stroke="#c8860a" stroke-width="1"/>
  <text x="62" y="71.5" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#7a4a00">Au</text>

  <!-- Bitcoin coin -->
  <circle cx="138" cy="67" r="12" fill="#f7931a" filter="url(#goldGlow)"/>
  <circle cx="138" cy="67" r="9" fill="none" stroke="#c07010" stroke-width="1"/>
  <text x="138" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">₿</text>

  <!-- Bottom label -->
  <text x="100" y="158" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="18" font-weight="bold" letter-spacing="4"
    fill="url(#goldGrad)" filter="url(#goldGlow)">INVERS</text>

  <!-- Tagline -->
  <text x="100" y="170" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="6.5" letter-spacing="2"
    fill="#4a8fa8">INVEST · TRACK · GROW</text>
</svg>
